<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Mon Training</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d0f1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mon Training">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #0d0f1a; --bg2: #131629; --bg3: #1a1f3a;
  --border: #2a3050; --text: #e8eaf0; --muted: #555e7a;
  --accent: #4f6ef7; --green: #1D9E75; --red: #e05c5c;
  --radius: 14px; --safe-top: env(safe-area-inset-top);
  --safe-bottom: env(safe-area-inset-bottom);
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
#app { min-height: 100dvh; display: flex; flex-direction: column; }

/* ── Spinner ── */
.spinner { display:flex; align-items:center; justify-content:center; height:100dvh; }
.spin { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
@keyframes fadeInModal { from { opacity:0; } to { opacity:1; } }
@keyframes popIn { 0% { transform:scale(0.2) rotate(-8deg); opacity:0; } 70% { transform:scale(1.08) rotate(2deg); } 100% { transform:scale(1) rotate(0); opacity:1; } }
@keyframes slideDown { from { transform:translateY(-18px); opacity:0; } to { transform:translateY(0); opacity:1; } }
@keyframes slideUp2 { from { transform:translateY(18px); opacity:0; } to { transform:translateY(0); opacity:1; } }
@keyframes pulseGlow { 0%,100% { transform:translate(-50%,-50%) scale(1); opacity:0.5; } 50% { transform:translate(-50%,-50%) scale(1.18); opacity:0.2; } }

/* ── Login ── */
.login-page { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100dvh; padding:24px; }
.login-logo { font-size:64px; margin-bottom:16px; }
.login-title { font-size:24px; font-weight:700; margin-bottom:4px; }
.login-sub { font-size:14px; color:var(--muted); margin-bottom:40px; }
.login-form { width:100%; max-width:360px; display:flex; flex-direction:column; gap:12px; }
.login-form input {
  background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius);
  color:var(--text); font-size:16px; padding:14px 16px; outline:none; width:100%;
  transition:border-color .2s;
}
.login-form input:focus { border-color:var(--accent); }
.login-form input::placeholder { color:var(--muted); }
.btn-primary {
  background:var(--accent); color:#fff; border:none; border-radius:var(--radius);
  font-size:16px; font-weight:600; padding:14px; cursor:pointer; transition:opacity .2s;
}
.btn-primary:active { opacity:.8; }
.btn-primary:disabled { opacity:.5; cursor:default; }
.login-error { color:var(--red); font-size:13px; text-align:center; min-height:18px; }

/* ── Header ── */
.header {
  background:var(--bg2); border-bottom:1px solid var(--border);
  padding:calc(var(--safe-top) + 12px) 16px 12px;
  display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:100;
}
.header-back { background:none; border:none; color:var(--text); font-size:20px; cursor:pointer; padding:4px 8px; }
.header-title { font-size:17px; font-weight:600; flex:1; }
.header-sub { font-size:12px; color:var(--muted); }

/* ── Nav bar ── */
.navbar {
  position:fixed; bottom:0; left:0; right:0;
  background:var(--bg2); border-top:1px solid var(--border);
  display:flex; padding:8px 0 calc(8px + var(--safe-bottom));
  z-index:100;
}
.nav-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; padding:4px 0; transition:color .2s; color:var(--muted); border:none; background:none; }
.nav-item.active { color:var(--accent); }
.nav-icon { font-size:22px; }
.nav-label { font-size:10px; font-weight:500; }

/* ── Page container ── */
.page { flex:1; overflow-y:auto; padding:16px 16px calc(80px + var(--safe-bottom)); }

/* ── Cards ── */
.card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:12px; }
.card-title { font-size:12px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:12px; }
.card-value { font-size:28px; font-weight:700; }
.card-sub { font-size:12px; color:var(--muted); margin-top:4px; }

/* ── Stats row ── */
.stats-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px; }

/* ── XP bar ── */
.xp-bar-bg { background:var(--bg3); border-radius:99px; height:8px; margin:8px 0 4px; overflow:hidden; }
.xp-bar-fill { height:100%; border-radius:99px; background:linear-gradient(90deg,var(--accent),#7c3aed); transition:width .6s ease; }

/* ── List items ── */
.list-item { display:flex; align-items:center; gap:12px; padding:14px 0; border-bottom:1px solid var(--border); cursor:pointer; }
.list-item:last-child { border-bottom:none; }
.list-icon { font-size:22px; width:36px; text-align:center; }
.list-text { flex:1; }
.list-title { font-size:15px; font-weight:500; }
.list-sub { font-size:12px; color:var(--muted); margin-top:2px; }
.list-arrow { color:var(--muted); font-size:16px; }

/* ── Badge ── */
.badge { display:inline-block; background:var(--accent); color:#fff; border-radius:99px; font-size:11px; font-weight:700; padding:2px 8px; }
.badge-green { background:var(--green); }
.badge-red { background:var(--red); }

/* ── Empty state ── */
.empty { text-align:center; padding:48px 16px; color:var(--muted); }
.empty-icon { font-size:48px; margin-bottom:12px; }
.empty-text { font-size:14px; }

/* ── Bilan ── */
.section-title { font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin:20px 0 8px; }
.field-label { font-size:11px;color:var(--muted);margin-bottom:3px;font-weight:600;letter-spacing:.5px; }
.bilan-input { width:100%;padding:8px;background:#0f1117;color:var(--text);border:1px solid var(--border);border-radius:6px;font-size:14px;font-family:inherit; }
.bilan-input[readonly] { opacity:.6; }
.bilan-textarea { width:100%;padding:10px;background:#0f1117;color:var(--text);border:1px solid var(--border);border-radius:6px;font-size:14px;font-family:inherit;resize:vertical;min-height:70px; }
.bilan-textarea[readonly] { opacity:.6; }
.bilan-banner { font-size:12px;color:var(--muted);text-align:center;margin-bottom:12px;padding:8px 12px;background:#1e2235;border-radius:8px; }
.btn-secondary { width:100%;background:#2d3142;color:var(--text);border:none;border-radius:var(--radius);font-size:14px;font-weight:600;padding:12px;cursor:pointer;margin-bottom:4px; }
.btn-blue { background:linear-gradient(135deg,#378ADD,#1a5ba0);color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-weight:600;padding:14px;cursor:pointer; }
.btn-green { background:linear-gradient(135deg,#1D9E75,#167a5a);color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-weight:600;padding:14px;cursor:pointer; }
.btn-disabled { background:#2d3142;color:var(--text);border:none;border-radius:var(--radius);font-size:14px;font-weight:600;padding:14px;opacity:.55;cursor:not-allowed; }

/* ── Training ── */
.t-select { width:100%;padding:10px;background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit; }
.set-row { display:flex;align-items:center;gap:6px;margin-bottom:6px; }
.set-num { font-size:12px;font-weight:700;color:var(--muted);width:24px;flex-shrink:0;text-align:center; }
.set-input { flex:1;padding:8px 4px;background:#0f1117;color:var(--text);border:1px solid var(--border);border-radius:6px;font-size:14px;text-align:center;min-width:0; }
.chrono-btn { background:#1e2444;border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;font-weight:600;padding:6px 10px;cursor:pointer;white-space:nowrap;flex-shrink:0; }

/* ── Diète ── */
.diete-item { background:#161b2e;border-radius:12px;border:1.5px solid #1e6648;padding:14px 16px;margin-bottom:10px;cursor:pointer;position:relative;overflow:hidden;display:flex;justify-content:space-between;align-items:center; }
.diete-bar  { position:absolute;top:0;left:0;bottom:0;width:3px;background:linear-gradient(180deg,#3ecf8e,#1a7a52);border-radius:12px 0 0 12px; }
.diete-arrow { width:26px;height:26px;background:#3ecf8e22;border:1px solid #3ecf8e66;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;color:#3ecf8e;font-weight:600; }
.macro-label { font-size:10px;color:var(--muted); }
</style>
</head>
<body>
<div id="app"></div>
<script src="api.js"></script>
<script src="bilan.js"></script>
<script src="training.js"></script>
<script src="diete.js"></script>
<script src="mensurations.js"></script>
<script src="recettes.js"></script>
<script src="progression.js"></script>
<script src="collection.js"></script>
<script src="coach.js"></script>
<script>
// ── État global ───────────────────────────────────────────────────────
const S = {
  page: 'loading',
  client:  localStorage.getItem('at_client')  || '',
  token:   localStorage.getItem('at_token')   || '',
  isCoach: localStorage.getItem('at_coach') === '1' || localStorage.getItem('at_client') === 'yohan',
  data: {}
};

function setPage(name) {
  S.page = name;
  // Pour les pages bilan, document.body peut avoir été remplacé — on s'assure que #app existe
  if (!document.getElementById('app')) {
    document.body.innerHTML = '<div id="app"></div>';
  }
  render();
  // Bandeau "Retour coach" persistant en mode vue-client
  if (_viewAsClientOverride && name !== 'loading') {
    if (!document.getElementById('coachRetourBanner')) {
      const nom = (_clientSelectionne && _clientSelectionne.nom) || _viewAsClientOverride;
      const banner = document.createElement('div');
      banner.id = 'coachRetourBanner';
      banner.style.cssText = 'position:fixed;bottom:calc(56px + env(safe-area-inset-bottom) + 8px);left:50%;transform:translateX(-50%);z-index:8000;background:linear-gradient(135deg,#E8A838,#c88010);color:#1a0e00;border-radius:20px;padding:8px 16px 8px 12px;display:flex;align-items:center;gap:10px;box-shadow:0 4px 16px rgba(0,0,0,.5);white-space:nowrap;';
      banner.innerHTML = `<span style="font-size:12px;font-weight:700;">👁️ Vue de <strong>${esc(nom)}</strong></span><button onclick="exitVueClient()" style="background:rgba(0,0,0,0.2);border:none;color:#1a0e00;font-size:12px;font-weight:700;padding:4px 10px;border-radius:10px;cursor:pointer;">✕ Retour</button>`;
      document.body.appendChild(banner);
    }
  }
}

// ── Vue client (coach simule un client) ───────────────────────────────
let _coachSavedState = null;
let _vueClientRetour = 'client-detail';

// andThen : callback de navigation à exécuter une fois en vue client (défaut loadHome)
// retour : page à afficher au clic sur "Retour coach" (défaut 'client-detail')
function enterVueClient(clientId, andThen, retour) {
  const nom = (_clientSelectionne && _clientSelectionne.nom) || clientId;
  _coachSavedState = {
    client: S.client,
    isCoach: S.isCoach,
    data: S.data,
    journeeData: _journeeData
  };
  S.client = clientId;
  S.isCoach = false;
  S.data = {};
  _journeeData = null;
  _viewAsClientOverride = clientId;
  _vueClientRetour = retour || 'client-detail';
  if (typeof andThen === 'function') andThen();
  else loadHome();
}

function exitVueClient() {
  if (!_coachSavedState) return;
  _viewAsClientOverride = null;
  S.client  = _coachSavedState.client;
  S.isCoach = _coachSavedState.isCoach;
  S.data    = _coachSavedState.data;
  _journeeData = _coachSavedState.journeeData;
  _coachSavedState = null;
  const banner = document.getElementById('coachRetourBanner');
  if (banner) banner.remove();
  setPage(_vueClientRetour || 'client-detail');
}

// ── Rendu principal ───────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  switch (S.page) {
    case 'loading':       app.innerHTML = renderSpinner(); break;
    case 'login':         app.innerHTML = renderLogin();   bindLogin(); break;
    case 'home':          document.body.innerHTML = renderHome(); break;
    case 'training':
    case 'training-loading': document.body.innerHTML = _tSubPage === 'seance' || S.page === 'training-loading' ? renderTrainingPage() : renderTrainingPage(); break;
    case 'bilan':
    case 'bilan-loading': document.body.innerHTML = renderBilanPage(); break;
    case 'diete':
    case 'diete-loading': document.body.innerHTML = renderDietePage();
      if (_dSubPage === 'detail') initDieteSliders((_dDetail && _dDetail.repas || []).length);
      break;
    case 'mensurations':
    case 'mens-loading':  document.body.innerHTML = renderMensurationsPage(); break;
    case 'recettes':
    case 'recettes-loading': document.body.innerHTML = renderRecettesPage(); break;
    case 'classement':           app.innerHTML = renderClassement();           break;
    case 'profil':               app.innerHTML = renderProfil();               break;
    case 'progression':          document.body.innerHTML = renderProgressionPage();      break;
    case 'collection':           document.body.innerHTML = renderCollectionPage();       break;
    case 'centre-bilans':        document.body.innerHTML = renderCentreBilans();         break;
    case 'notifications-coach':  document.body.innerHTML = renderNotificationsCoach();   break;
    case 'rapports-bugs':        document.body.innerHTML = renderRapportsBugs();         break;
    case 'mes-clients':          document.body.innerHTML = renderMesClients();           break;
    case 'client-detail':        document.body.innerHTML = renderClientDetail();         break;
    case 'client-progression':   document.body.innerHTML = renderClientProgression();    break;
  }
}

// ── Spinner ───────────────────────────────────────────────────────────
function renderSpinner() {
  return `<div class="spinner"><div class="spin"></div></div>`;
}

// ── Login ─────────────────────────────────────────────────────────────
function renderLogin() {
  return `
  <div class="login-page">
    <div class="login-logo">💪</div>
    <div class="login-title">Mon Training</div>
    <div class="login-sub">Connecte-toi pour accéder à ton programme</div>
    <div class="login-form">
      <input id="l-client" type="text" placeholder="Ton prénom" autocomplete="username" autocapitalize="none">
      <input id="l-mdp"    type="password" placeholder="Mot de passe" autocomplete="current-password">
      <button class="btn-primary" id="l-btn">Se connecter</button>
      <div class="login-error" id="l-err"></div>
    </div>
  </div>`;
}

function bindLogin() {
  document.getElementById('l-btn').addEventListener('click', doLogin);
  document.getElementById('l-mdp').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
}

async function doLogin() {
  const client = document.getElementById('l-client').value.trim().toLowerCase();
  const mdp    = document.getElementById('l-mdp').value;
  const btn    = document.getElementById('l-btn');
  const err    = document.getElementById('l-err');
  if (!client || !mdp) { err.textContent = 'Remplis tous les champs.'; return; }
  btn.disabled = true; btn.textContent = '…';
  err.textContent = '';
  try {
    const GAS = 'https://script.google.com/macros/s/AKfycbwQiM6ixf-CTIWwcuNHoosFbvrDzWmC056yRUGhTaWv0Nwxbm0dLeK3d5QVgqmS7P9G7A/exec';
    const res  = await fetch(GAS, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'login', client, mdp })
    });
    const json = await res.json();
    if (!json.ok) throw new Error(json.error || 'Identifiants incorrects');
    localStorage.setItem('at_client', json.client);
    localStorage.setItem('at_token',  json.token);
    const isCoach = !!(json.coachMode || json.client === 'yohan');
    localStorage.setItem('at_coach',  isCoach ? '1' : '0');
    S.client  = json.client;
    S.token   = json.token;
    S.isCoach = isCoach;
    await loadHome();
  } catch(e) {
    err.textContent = e.message === 'token_invalide' ? 'Identifiants incorrects.' : (e.message || 'Erreur de connexion.');
    btn.disabled = false; btn.textContent = 'Se connecter';
  }
}

// ── Home ──────────────────────────────────────────────────────────────
let _journeeData = null;

async function loadHome() {
  setPage('loading');
  try {
    const [prog, bilan] = await Promise.all([
      api('chargerProgressionClient'),
      api('chargerBilan')
    ]);
    S.data.prog  = prog;
    S.data.bilan = bilan;
    if (S.isCoach) {
      try {
        const bilans = await api('listerBilansCoach');
        S.data.coachBilans = bilans;
        S.data.coachBilansCount = (bilans || []).filter(b => !b.coachTraite).length;
      } catch(e) { S.data.coachBilansCount = 0; }
      try {
        const rapports = await api('chargerRapportsBugs');
        S.data.bugsNonLus = rapports?.nonLus || 0;
      } catch(e) { S.data.bugsNonLus = 0; }
      try {
        const result = await api('chargerTousLesLogs');
        const lastSeen = result?.lastSeen || 0;
        S.data.notifsNonLues = (result?.logs || []).filter(l => l.tms > lastSeen).length;
      } catch(e) { S.data.notifsNonLues = 0; }
    }
    setPage('home');
    // Détection déblocages niveau/titres (clients seulement, pas le coach en vue client)
    if (!S.isCoach && !_viewAsClientOverride) {
      setTimeout(() => verifierDeblocages(S.data.prog), 300);
    }
    // fire-and-forget classement — lit un spreadsheet séparé (LOG_SHEET_ID), safe en concurrent
    setTimeout(() => {
      api('listerClassement').then(raw => {
        const cl = typeof raw === 'string' ? JSON.parse(raw || '[]') : (Array.isArray(raw) ? raw : []);
        S.data.classement = cl;
        const el = document.getElementById('top5Home');
        if (el) el.outerHTML = renderTop5Home(cl);
      }).catch(() => {});
    }, 0);
  } catch(e) {
    localStorage.removeItem('at_token');
    setPage('login');
  }
}

function renderCarteJournee(data) {
  if (!data || data.aucun) return '<div id="carteJourneeHome"></div>';
  const valide = !!data.valide;
  const JOURS = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const jourNom = JOURS[new Date(Date.now() - 2*3600*1000).getDay()];
  const col = on => on ? '#1D9E75' : '#555e7a';
  const steps = data.steps !== '' && data.steps != null
    ? (parseInt(data.steps) >= 1000 ? Math.round(parseInt(data.steps)/100)/10 + 'k' : data.steps)
    : '—';
  const borderColor = valide ? '#1D9E75' : '#378ADD';
  const cursor = valide ? 'default' : 'pointer';
  const onclick = valide ? '' : `onclick="ouvrirJourneeModal()"`;
  return `<div id="carteJourneeHome" ${onclick}
    ontouchstart="this.style.opacity='.8'" ontouchend="this.style.opacity='1'"
    style="background:#161b2e;border-radius:12px;border-left:3px solid ${borderColor};border:1px solid ${borderColor}33;border-left:3px solid ${borderColor};padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;gap:14px;cursor:${cursor};-webkit-tap-highlight-color:transparent;">
    <div style="flex:1;min-width:0;">
      <div style="font-size:10px;font-weight:700;color:#555e7a;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px;">Journée en cours</div>
      <div style="font-size:15px;font-weight:700;color:${valide ? '#1D9E75' : '#f0f2ff'};margin-bottom:8px;">${valide ? '✓ Journée validée' : jourNom}</div>
      <div style="display:flex;gap:12px;">
        <span style="font-size:12px;color:${col(data.diete)};font-weight:700;">🥗${data.diete ? '✓' : '—'}</span>
        <span style="font-size:12px;color:#8892a4;font-weight:600;">👟${steps}</span>
        <span style="font-size:12px;color:${col(data.training)};font-weight:700;">🏋${data.training ? '✓' : '—'}</span>
        <span style="font-size:12px;color:${col(data.cardio)};font-weight:700;">🏃${data.cardio ? '✓' : '—'}</span>
      </div>
    </div>
    ${!valide ? `<div style="background:linear-gradient(135deg,#378ADD,#1a5ba0);color:#fff;font-size:12px;font-weight:700;padding:8px 12px;border-radius:8px;white-space:nowrap;flex-shrink:0;">Valider ↗</div>` : ''}
  </div>`;
}

function renderTop5Home(liste) {
  if (!liste || liste.length === 0) return '<div id="top5Home"></div>';
  const _podium = [
    { bg:'linear-gradient(135deg,#1e1700,#3d2e00)', border:'1.5px solid #f59e0b', namec:'#fde68a' },
    { bg:'linear-gradient(135deg,#101420,#1e2838)', border:'1.5px solid #94a3b8', namec:'#d4d8e0' },
    { bg:'linear-gradient(135deg,#140e09,#271c0d)', border:'1px solid #b45309',   namec:'#d4956a' }
  ];
  const medals = ['🥇','🥈','🥉'];
  const rows = liste.map((c, i) => {
    const tier = typeof niveauToTier === 'function' ? niveauToTier(c.niveau) : 'debutant';
    const tc = typeof getTierColors === 'function' ? getTierColors(tier) : {c1:'#a8b0c8',c2:'#404858'};
    const isMe = c.client === S.client || c.id === S.client;
    const parts = (c.nom || c.prenom || c.client || '').trim().split(' ');
    const nom = parts[0] + (parts[1] ? ' ' + parts[1][0] + '.' : '');
    let bg, border, namec;
    if (i < 3) { bg = _podium[i].bg; border = _podium[i].border; namec = isMe ? tc.c1 : _podium[i].namec; }
    else { bg = `linear-gradient(145deg,#0f1117,${tc.c2}aa,#0f1117)`; border = isMe ? `1px solid ${tc.c1}88` : '1px solid #1e2235'; namec = isMe ? tc.c1 : '#f0f2ff'; }
    const badgeSz = i === 0 ? 34 : 30;
    return `<div style="display:flex;align-items:center;gap:10px;padding:${i===0?'10px':'8px'} 12px;border-radius:10px;margin-bottom:5px;background:${bg};border:${border};">

  }).join('');
  return `<div id="top5Home" style="background:#161b2e;border-radius:12px;border:1px solid #1e2235;padding:14px 16px;margin-top:14px;">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid #1e2235;">

}

async function loadClassement() {
  setPage('loading');
  try {
    const raw = await api('listerClassement');
    S.data.classement = typeof raw === 'string' ? JSON.parse(raw || '[]') : (Array.isArray(raw) ? raw : []);
    setPage('classement');
  } catch(e) { setPage('home'); }
}

function renderClassement() {
  const items = S.data.classement || [];
  const rows = items.map((c, i) => {
    const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i+1}.`;
    const isMe  = c.client === S.client;
    return `
    <div class="list-item" style="${isMe ? 'color:var(--accent);' : ''}">
      <div class="list-icon" style="font-size:18px;">${medal}</div>
      <div class="list-text">
        <div class="list-title">${c.prenom || c.client}</div>
        <div class="list-sub">Niv. ${c.niveau} · ${(c.xpTotal||0).toLocaleString('fr')} XP</div>
      </div>
    </div>`;
  }).join('');

  return `
  <div id="app">
    ${renderHeader('Classement', '', false)}
    <div class="page">
      <div class="card">${rows || '<div class="empty"><div class="empty-text">Aucun résultat</div></div>'}</div>
    </div>
    ${renderNavBar('classement')}
  </div>`;
}

    inner = `
      <button onclick="ouvrirSettings('menu')" style="display:block;width:100%;background:transparent;border:none;color:#8892a4;font-size:13px;padding:0 0 16px;cursor:pointer;text-align:left;">‹ Retour</button>
      <div style="font-size:16px;font-weight:700;color:#f0f2ff;margin-bottom:16px;">📖 Guide & Fonctionnement</div>
      <div style="font-size:13px;color:#c0c8d8;line-height:1.7;max-height:55vh;overflow-y:auto;">
        <div style="font-weight:700;color:#4f8ef7;margin-bottom:6px;">🏋️ Entraînement</div>
        <div style="margin-bottom:12px;">Saisis tes séances semaine par semaine. Charge, reps et temps de repos sont enregistrés et suivis dans ta progression.</div>
        <div style="font-weight:700;color:#3ecf8e;margin-bottom:6px;">🥗 Diète</div>
        <div style="margin-bottom:12px;">Consulte ton plan alimentaire personnalisé. Chaque repas est détaillé avec les macros (protéines, glucides, lipides).</div>
        <div style="font-weight:700;color:#a78bfa;margin-bottom:6px;">📏 Mensurations</div>
        <div style="margin-bottom:12px;">Enregistre régulièrement ton poids et tes mensurations pour suivre ton évolution dans le temps avec des graphiques.</div>
        <div style="font-weight:700;color:#f59e0b;margin-bottom:6px;">📋 Bilan hebdomadaire</div>
        <div style="margin-bottom:12px;">Chaque semaine, remplis ton bilan (énergie, douleurs, nutrition, entraînement) et valide-le. Ton coach le consulte et te répond.</div>
        <div style="font-weight:700;color:#378ADD;margin-bottom:6px;">☀️ Journée en cours</div>
        <div style="margin-bottom:12px;">Chaque jour, coche ce que tu as fait (diète, training, cardio) et renseigne tes pas. Valide ta journée une fois terminée.</div>
        <div style="font-weight:700;color:#f59e0b;margin-bottom:6px;">⭐ XP & Niveaux</div>
        <div style="margin-bottom:12px;">Tu gagnes de l'XP en validant tes bilans, journées, séances, etc. Monte de niveau pour débloquer des badges et titres exclusifs.</div>
      </div>`;
  } else if (_settingsTab === 'bug') {
    inner = `
      <button onclick="ouvrirSettings('menu')" style="display:block;width:100%;background:transparent;border:none;color:#8892a4;font-size:13px;padding:0 0 16px;cursor:pointer;text-align:left;">‹ Retour</button>
      <div style="font-size:16px;font-weight:700;color:#f0f2ff;margin-bottom:6px;">🐛 Signaler un bug</div>
      <div style="font-size:12px;color:#8892a4;margin-bottom:16px;">Décris le problème rencontré et sur quelle page</div>
      <textarea id="bugDesc" placeholder="Ex: Sur la page bilan, le bouton 'Valider' ne répond pas après avoir rempli les champs…"
        style="width:100%;padding:12px;background:#0f1117;color:#e8eaf0;border:1px solid #2d3142;border-radius:10px;font-size:13px;font-family:inherit;resize:none;height:120px;box-sizing:border-box;margin-bottom:12px;"></textarea>
      <button onclick="envoyerBugReport()" style="width:100%;padding:13px;background:linear-gradient(135deg,#4f8ef7,#2260c8);border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;">Envoyer le rapport</button>`;
  } else {
    inner = `
      <div style="font-size:16px;font-weight:700;color:#f0f2ff;margin-bottom:16px;">Paramètres</div>
      <button onclick="document.getElementById('settingsPanel').remove();loadProgression()" style="display:flex;align-items:center;gap:12px;width:100%;background:#131929;border:1px solid #2a3050;color:#e8eaf0;font-size:14px;font-weight:600;padding:13px 16px;border-radius:10px;cursor:pointer;margin-bottom:8px;text-align:left;">📊<span>Ma progression</span></button>
      <button onclick="document.getElementById('settingsPanel').remove();loadCollection()" style="display:flex;align-items:center;gap:12px;width:100%;background:#131929;border:1px solid #2a3050;color:#e8eaf0;font-size:14px;font-weight:600;padding:13px 16px;border-radius:10px;cursor:pointer;margin-bottom:8px;text-align:left;">🏆<span>Ma collection</span></button>
      <button onclick="ouvrirSettings('guide')" style="display:flex;align-items:center;gap:12px;width:100%;background:#131929;border:1px solid #2a3050;color:#e8eaf0;font-size:14px;font-weight:600;padding:13px 16px;border-radius:10px;cursor:pointer;margin-bottom:8px;text-align:left;">📖<span>Guide & Fonctionnement</span></button>
      <button onclick="ouvrirSettings('bug')" style="display:flex;align-items:center;gap:12px;width:100%;background:#131929;border:1px solid #2a3050;color:#e8eaf0;font-size:14px;font-weight:600;padding:13px 16px;border-radius:10px;cursor:pointer;margin-bottom:20px;text-align:left;">🐛<span>Signaler un bug</span></button>
      <button onclick="document.getElementById('settingsPanel').remove();deconnexion()" style="display:flex;align-items:center;gap:12px;width:100%;background:#1a0a0a;border:1px solid #5a2020;color:#e05c5c;font-size:14px;font-weight:600;padding:13px 16px;border-radius:10px;cursor:pointer;margin-bottom:8px;text-align:left;">🚪<span>Se déconnecter</span></button>
      <button onclick="document.getElementById('settingsPanel').remove()" style="display:block;width:100%;background:transparent;border:none;color:#555e7a;font-size:14px;padding:10px;cursor:pointer;">Annuler</button>`;
  }

  el.innerHTML = `<div style="background:#1a1d29;border-radius:16px 16px 0 0;padding:20px 20px calc(28px + env(safe-area-inset-bottom));width:100%;max-width:500px;margin:0 auto;">
    <div style="width:36px;height:4px;background:#2d3142;border-radius:2px;margin:0 auto 20px;"></div>
    ${inner}
  </div>`;
  el.onclick = e => { if (e.target === el) el.remove(); };
  document.body.appendChild(el);
}

async function envoyerBugReport() {
  const desc = (document.getElementById('bugDesc')?.value || '').trim();
  if (!desc) return;
  const panel = document.getElementById('settingsPanel');
  const btn = panel?.querySelector('button[onclick="envoyerBugReport()"]');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Envoi...'; }
  try {
    await api('envoyerRapportBug', { message: desc });
    if (panel) {
      panel.querySelector('div > div').innerHTML = `<div style="text-align:center;padding:20px 0;">
        <div style="font-size:40px;margin-bottom:12px;">✅</div>
        <div style="font-size:16px;font-weight:700;color:#f0f2ff;margin-bottom:8px;">Rapport envoyé !</div>
        <div style="font-size:13px;color:#8892a4;margin-bottom:20px;">Ton coach a été prévenu.</div>
        <button onclick="document.getElementById('settingsPanel').remove()" style="background:#2d3142;border:none;border-radius:10px;color:#e8eaf0;font-size:14px;padding:12px 24px;cursor:pointer;">Fermer</button>
      </div>`;
    }
  } catch(e) {
    if (btn) { btn.disabled = false; btn.textContent = 'Envoyer le rapport'; }
    showToast('Erreur : ' + e.message, '#c0392b');
  }
}

// ── Journée en cours modal ────────────────────────────────────────────
async function ouvrirJourneeModal() {
  // Chargement à la demande (1ère ouverture)
  if (!_journeeData) {
    const carte = document.getElementById('carteJourneeHome');
    if (carte) { const lbl = document.getElementById('journeeHomeLabel'); if (lbl) lbl.textContent = 'Chargement…'; }
    try {
      _journeeData = await api('chargerJourneeEnCours');
    } catch(e) {
      const lbl = document.getElementById('journeeHomeLabel');
      if (lbl) lbl.textContent = 'Appuyer pour charger';
      return;
    }
    _majCarteJournee();
  }
  if (!_journeeData || _journeeData.aucun) return;
  if (_journeeData.valide) return; // déjà validée, la carte l'affiche
  // Rafraîchir les valeurs de la ligne
  try {
    const fresh = await api('chargerDonneesJournee', { ligne: _journeeData.ligne });
    if (fresh) { _journeeData.diete = fresh.diete; _journeeData.steps = fresh.steps; _journeeData.training = fresh.training; _journeeData.cardio = fresh.cardio; }
  } catch(e) {}
  _afficherModalJournee();
}

function _majCarteJournee() {
  const d = _journeeData;
  const lbl = document.getElementById('journeeHomeLabel');
  const statuts = document.getElementById('journeeHomeStatuts');
  const btn = document.querySelector('#carteJourneeHome > div:last-child');
  if (!d || d.aucun) return;
  const JOURS = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const jourNom = JOURS[new Date(Date.now() - 2*3600*1000).getDay()];
  const col = on => on ? '#1D9E75' : '#555e7a';
  const steps = d.steps !== '' && d.steps != null
    ? (parseInt(d.steps) >= 1000 ? Math.round(parseInt(d.steps)/100)/10 + 'k' : d.steps) : '—';
  const carte = document.getElementById('carteJourneeHome');
  if (d.valide) {
    if (carte) { carte.style.borderLeftColor = '#1D9E75'; carte.style.borderColor = '#1D9E7533'; carte.style.borderLeftColor = '#1D9E75'; carte.onclick = null; carte.style.cursor = 'default'; }
    if (lbl) { lbl.textContent = '✓ Journée validée'; lbl.style.color = '#1D9E75'; }
    if (btn) btn.style.display = 'none';
  } else {
    if (lbl) { lbl.textContent = jourNom; lbl.style.color = '#f0f2ff'; }
  }
  if (statuts) statuts.innerHTML =
    `<span style="font-size:12px;color:${col(d.diete)};font-weight:700;">🥗${d.diete?'✓':'—'}</span>` +
    `<span style="font-size:12px;color:#8892a4;font-weight:600;">👟${steps}</span>` +
    `<span style="font-size:12px;color:${col(d.training)};font-weight:700;">🏋${d.training?'✓':'—'}</span>` +
    `<span style="font-size:12px;color:${col(d.cardio)};font-weight:700;">🏃${d.cardio?'✓':'—'}</span>`;
}

function _afficherModalJournee() {
  const existant = document.getElementById('modalJournee');
  if (existant) existant.remove();
  const d = _journeeData;
  const JOURS = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const jourNom = JOURS[new Date(Date.now() - 2*3600*1000).getDay()];
  const modal = document.createElement('div');
  modal.id = 'modalJournee';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;display:flex;align-items:flex-end;';
  modal.innerHTML = `
    <div style="background:#1a1f35;border-radius:20px 20px 0 0;padding:24px 20px calc(32px + env(safe-area-inset-bottom));width:100%;max-width:500px;margin:0 auto;box-sizing:border-box;">
      <div style="width:36px;height:4px;background:#2d3142;border-radius:2px;margin:0 auto 20px;"></div>
      <div style="font-size:11px;font-weight:600;color:#555e7a;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;">Journée en cours</div>
      <div style="font-size:18px;font-weight:700;color:#f0f2ff;margin-bottom:20px;">${jourNom}</div>
      <div style="display:flex;gap:8px;margin-bottom:16px;">
        <button id="jTogDiete" onclick="toggleJourneeField('diete')" style="flex:1;padding:12px 6px;border:none;border-radius:10px;color:#e8eaf0;font-size:13px;font-weight:600;cursor:pointer;background:${d.diete?'#1D9E75':'#2d3142'};">${d.diete?'✓ ':''}Diète</button>
        <button id="jTogTraining" onclick="toggleJourneeField('training')" style="flex:1;padding:12px 6px;border:none;border-radius:10px;color:#e8eaf0;font-size:13px;font-weight:600;cursor:pointer;background:${d.training?'#1D9E75':'#2d3142'};">${d.training?'✓ ':''}Training</button>
        <button id="jTogCardio" onclick="toggleJourneeField('cardio')" style="flex:1;padding:12px 6px;border:none;border-radius:10px;color:#e8eaf0;font-size:13px;font-weight:600;cursor:pointer;background:${d.cardio?'#1D9E75':'#2d3142'};">${d.cardio?'✓ ':''}Cardio</button>
      </div>
      <div style="margin-bottom:20px;">
        <div style="font-size:11px;color:#8892a4;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px;">Steps</div>
        <input id="jSteps" type="text" inputmode="numeric" value="${d.steps||''}" placeholder="ex: 10200"
          onchange="sauverStepsJournee(this.value)"
          style="width:100%;padding:12px;background:#0f1117;color:#e8eaf0;border:1px solid #2d3142;border-radius:10px;font-size:16px;box-sizing:border-box;">
      </div>
      <button id="btnValiderJournee" onclick="validerJourneeClient()" style="width:100%;padding:14px;background:linear-gradient(135deg,#1D9E75,#167a5a);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;">✅ Valider ma journée</button>
      <button onclick="document.getElementById('modalJournee').remove()" style="width:100%;margin-top:8px;padding:12px;background:#2d3142;border:none;border-radius:12px;color:#8892a4;font-size:14px;cursor:pointer;">Fermer</button>
    </div>`;
  document.body.appendChild(modal);
  modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
}

function toggleJourneeField(type) {
  if (!_journeeData) return;
  _journeeData[type] = !_journeeData[type];
  const cols = { diete: 14, training: 18, cardio: 19 };
  api('enregistrerValeur', { nomFeuille: 'Bilan', ligne: _journeeData.ligne, colonne: cols[type], valeur: _journeeData[type] }).catch(() => {});
  const labels = { diete: 'Diète', training: 'Training', cardio: 'Cardio' };
  const id = { diete: 'jTogDiete', training: 'jTogTraining', cardio: 'jTogCardio' };
  const btn = document.getElementById(id[type]);
  if (btn) { btn.style.background = _journeeData[type] ? '#1D9E75' : '#2d3142'; btn.textContent = (_journeeData[type] ? '✓ ' : '') + labels[type]; }
}

function sauverStepsJournee(val) {
  if (!_journeeData) return;
  const v = parseInt((val+'').replace(/\s/g,'')) || '';
  _journeeData.steps = v;
  api('enregistrerValeur', { nomFeuille: 'Bilan', ligne: _journeeData.ligne, colonne: 17, valeur: v }).catch(() => {});
}

async function validerJourneeClient() {
  if (!_journeeData) return;
  const stepsEl = document.getElementById('jSteps');
  if (stepsEl) sauverStepsJournee(stepsEl.value);
  const btn = document.getElementById('btnValiderJournee');
  if (btn) { btn.disabled = true; btn.style.opacity = '0.6'; btn.textContent = 'Validation…'; }
  try {
    await api('validerJournee', { ligne: _journeeData.ligne, semaine: _journeeData.semaine });
    _journeeData.valide = true;
    const modal = document.getElementById('modalJournee');
    if (modal) modal.remove();
    _majCarteJournee();
    setTimeout(() => rafraichirProgressionEtDeblocages(), 300);
  } catch(e) {
    if (btn) { btn.disabled = false; btn.style.opacity = '1'; btn.textContent = '✅ Valider ma journée'; }
    alert('Erreur lors de la validation.');
  }
}

function deconnexion() {
  localStorage.removeItem('at_token');
  localStorage.removeItem('at_client');
  localStorage.removeItem('at_coach');
  S.client = ''; S.token = ''; S.isCoach = false; S.data = {};
  setPage('login');
}

// ── Composants partagés ───────────────────────────────────────────────
function renderHeader(title, sub, showBack) {
  return `
  <div class="header">
    ${showBack ? `<button class="header-back" onclick="history.back()">‹</button>` : ''}
    <div>
      <div class="header-title">${title}</div>
      ${sub ? `<div class="header-sub">${sub}</div>` : ''}
    </div>
  </div>`;
}

function renderNavBar(active) {
  const items = [
    { id:'home',         icon:'🏠', label:'Accueil'   },
    { id:'training',     icon:'🏋️', label:'Programme' },
    { id:'bilan',        icon:'📊', label:'Bilan'     },
    { id:'diete',        icon:'🥗', label:'Diète'     },
    { id:'mensurations', icon:'📏', label:'Mensu.'    },
    { id:'recettes',     icon:'🍽️', label:'Recettes'  },
  ];
  return `<nav class="navbar">${items.map(it => `
    <button class="nav-item${it.id===active?' active':''}" onclick="goTo('${it.id}')">
      <span class="nav-icon">${it.icon}</span>
      <span class="nav-label">${it.label}</span>
    </button>`).join('')}
  </nav>`;
}

function bindNav() {}

function goTo(page) {
  if (page === 'home')        loadHome();
  else if (page === 'bilan')    loadBilan();
  else if (page === 'training') loadTraining();
  else if (page === 'diete')         loadDiete();
  else if (page === 'mensurations')  loadMensurations();
  else if (page === 'recettes')      loadRecettes();
  else if (page === 'classement')   loadClassement();
  else if (page === 'progression')  loadProgression();
  else if (page === 'collection')   loadCollection();
  else setPage(page);
}

// ── Init ──────────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

if (S.token && S.client) {
  loadHome();
} else {
  setPage('login');
}
</script>
</body>
</html>
