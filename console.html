<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AppTraining — Console Coach</title>
<style>
  :root {
    --bg: #0b0b0c;
    --surface: #151514;
    --surface-2: #1c1c1a;
    --surface-3: #262524;
    --hairline: rgba(255,255,255,0.055);
    --text: #f5f2ec;
    --text-muted: #9d968a;
    --text-faint: #656055;
    --accent: #f2ba3e;
    --accent-soft: #f2ba3e17;
    --accent-2: #f5a83c;
    --accent-2-soft: #f5a83c14;
    --success: #3ecf8e;
    --success-soft: #3ecf8e17;
    --warning: #e08a3c;
    --warning-soft: #e08a3c17;
    --critical: #e2615c;
    --critical-soft: #e2615c17;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
    --shadow-lg: 0 20px 44px rgba(0,0,0,0.55), 0 2px 8px rgba(0,0,0,0.35);
    --radius: 16px;
    --radius-sm: 10px;
    --font-display: -apple-system, BlinkMacSystemFont, "Segoe UI", "SF Pro Display", system-ui, sans-serif;
    --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    --font-mono: ui-monospace, "SF Mono", "Cascadia Mono", "Roboto Mono", Menlo, Consolas, monospace;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; background: var(--bg); color: var(--text); font-family: var(--font-body);
    font-size: 13px; line-height: 1.45; -webkit-font-smoothing: antialiased; overflow: hidden;
  }
  @media (prefers-reduced-motion: reduce) { *, *::before, *::after { transition: none !important; animation: none !important; } }
  ::selection { background: var(--accent-soft); }
  button { font-family: inherit; }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }

  .shell { display: grid; grid-template-columns: 232px 1fr; grid-template-rows: 58px 1fr; height: 100vh; background: var(--bg); }

  .gate { height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 14px; text-align: center; padding: 20px; }
  .gate .mark { width: 40px; height: 40px; border-radius: 12px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); }
  .gate h1 { font-family: var(--font-display); font-size: 18px; margin: 0; }
  .gate p { color: var(--text-muted); font-size: 13px; margin: 0; max-width: 320px; }
  .gate a.btn { text-decoration: none; }
  .spin { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--surface-3); border-top-color: var(--accent); animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Topbar ── */
  .topbar {
    grid-column: 1 / -1; display: flex; align-items: center; gap: 14px; padding: 0 20px;
    border-bottom: 1px solid var(--hairline); background: var(--bg);
  }
  .brand { display: flex; align-items: center; gap: 9px; font-family: var(--font-display); font-weight: 700; font-size: 13px; letter-spacing: 0.02em; width: 212px; flex-shrink: 0; }
  .brand .mark { width: 22px; height: 22px; border-radius: 7px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); flex-shrink: 0; }
  .brand .sub { color: var(--text-faint); font-weight: 500; font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; margin-left: 2px; }

  .search { position: relative; flex: 1; max-width: 420px; }
  .search input {
    width: 100%; background: var(--surface); border: 1px solid transparent; border-radius: var(--radius-sm);
    padding: 8px 12px 8px 32px; color: var(--text); font-size: 12.5px; font-family: inherit;
  }
  .search input:focus { border-color: var(--hairline); }
  .search input::placeholder { color: var(--text-faint); }
  .search svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-faint); }

  .topbar-actions { display: flex; align-items: center; gap: 8px; margin-left: auto; }
  .btn {
    display: inline-flex; align-items: center; gap: 6px; border: 1px solid transparent; background: var(--surface);
    color: var(--text); font-size: 12px; font-weight: 600; padding: 8px 13px; border-radius: var(--radius-sm); cursor: pointer;
  }
  .btn:hover { background: var(--surface-2); }
  .btn.primary { background: var(--accent); color: #1a1408; }
  .btn.primary:hover { filter: brightness(1.08); }
  .icon-btn {
    position: relative; display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px;
    border: none; background: var(--surface); border-radius: var(--radius-sm); color: var(--text-muted); cursor: pointer;
  }
  .icon-btn:hover { background: var(--surface-2); color: var(--text); }
  .badge-dot { position: absolute; top: -4px; right: -4px; min-width: 15px; height: 15px; padding: 0 3px; border-radius: 8px; background: var(--critical); color: #fff; font-size: 9px; font-weight: 700; display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); }

  .avatar {
    width: 32px; height: 32px; border-radius: var(--radius-sm); background: var(--surface-2);
    display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; cursor: pointer; color: var(--text);
  }

  /* ── Dropdowns ── */
  .dropdown { position: relative; }
  .menu {
    position: absolute; top: calc(100% + 8px); right: 0; min-width: 210px; background: var(--surface-2);
    border-radius: var(--radius-sm); box-shadow: var(--shadow-lg); padding: 6px;
    display: none; z-index: 60;
  }
  .menu.open { display: block; }
  .menu-item {
    display: flex; align-items: center; gap: 9px; width: 100%; text-align: left; padding: 8px 9px; border-radius: 7px;
    border: none; background: none; color: var(--text); font-size: 12.5px; cursor: pointer;
  }
  .menu-item:hover { background: var(--surface-3); }
  .menu-item.danger { color: var(--critical); }
  .menu-item svg { color: var(--text-faint); flex-shrink: 0; }
  .menu-item.danger svg { color: var(--critical); }
  .menu-sep { height: 1px; background: var(--hairline); margin: 5px 4px; }
  .menu-label { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-faint); padding: 6px 9px 3px; font-weight: 600; }

  /* ── Sidebar ── */
  .sidebar { border-right: 1px solid var(--hairline); background: var(--bg); display: flex; flex-direction: column; padding: 16px 12px; overflow-y: auto; }
  .nav-group { margin-bottom: 4px; }
  .nav-label { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-faint); font-weight: 700; padding: 14px 10px 6px; }
  .nav-item {
    display: flex; align-items: center; gap: 10px; width: 100%; border: none; background: none; text-align: left;
    padding: 8px 10px; border-radius: var(--radius-sm); color: var(--text-muted); font-size: 12.5px; font-weight: 600; cursor: pointer;
  }
  .nav-item svg { flex-shrink: 0; color: var(--text-faint); }
  .nav-item:hover { background: var(--surface); color: var(--text); }
  .nav-item.active { background: var(--accent-soft); color: var(--accent); }
  .nav-item.active svg { color: var(--accent); }
  .nav-count { margin-left: auto; font-family: var(--font-mono); font-size: 10.5px; background: var(--surface-2); color: var(--text-muted); padding: 1px 6px; border-radius: 999px; }
  .sidebar-footer { margin-top: auto; padding: 12px 10px 4px; border-top: 1px solid var(--hairline); display: flex; align-items: center; gap: 9px; }
  .sidebar-footer .name { font-size: 12px; font-weight: 700; }
  .sidebar-footer .role { font-size: 10.5px; color: var(--text-faint); }

  /* ── Main ── */
  .main { overflow-y: auto; padding: 24px 28px 40px; }
  .page-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 20px; }
  .page-head .eyebrow { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-faint); font-weight: 700; margin-bottom: 4px; }
  .page-head h1 { font-family: var(--font-display); font-size: 22px; margin: 0; font-weight: 700; letter-spacing: -0.01em; text-wrap: balance; }
  .page-head .meta { font-size: 12px; color: var(--text-muted); font-family: var(--font-mono); }

  /* ── Dashboard grid ── */
  .dash-grid { display: grid; grid-template-columns: repeat(3, 1fr); grid-auto-rows: min-content; gap: 14px; }
  .card { background: var(--surface); border-radius: var(--radius); display: flex; flex-direction: column; box-shadow: var(--shadow-sm); }
  .card-head { display: flex; align-items: center; gap: 8px; padding: 15px 16px 12px; }
  .card-head svg { color: var(--accent); flex-shrink: 0; }
  .card-head .t { font-weight: 700; font-size: 12.5px; margin-right: auto; }
  .card-head .link { font-size: 11.5px; color: var(--text-faint); cursor: pointer; font-weight: 600; }
  .card-head .link:hover { color: var(--accent); }
  .card-list { padding: 2px 8px 10px; overflow-y: auto; }
  .card-list-row { display: flex; align-items: center; gap: 9px; padding: 8px 8px; border-radius: 10px; cursor: pointer; }
  .card-list-row:hover { background: var(--surface-2); }
  .card-list-row .t { font-size: 12.5px; font-weight: 600; }
  .card-list-row .s { font-size: 11px; color: var(--text-faint); margin-top: 1px; }
  .card-list-row .time { margin-left: auto; font-family: var(--font-mono); font-size: 10.5px; color: var(--text-faint); white-space: nowrap; }
  .card-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; padding: 30px 16px; text-align: center; color: var(--text-muted); font-size: 12px; flex: 1; }
  .card-empty svg { color: var(--success); }

  .chart-card .chart-top { display: flex; align-items: baseline; justify-content: space-between; padding: 0 16px; }
  .chart-card .big-value { font-family: var(--font-mono); font-size: 26px; font-weight: 700; letter-spacing: -0.01em; }
  .chart-card .period { font-size: 11.5px; color: var(--text-faint); border-radius: 999px; padding: 4px 10px; background: var(--surface-2); }
  .chart-card svg.bigchart { width: 100%; height: 108px; display: block; padding: 10px 8px 6px; }

  .timeline-card .card-list { padding: 4px 16px 14px; }
  .tl-row { display: flex; gap: 10px; padding: 9px 0; cursor: default; border-radius: 0; }
  .tl-row.clickable { cursor: pointer; }
  .tl-row.clickable:hover { background: var(--surface-2); }
  .tl-dot { width: 7px; height: 7px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; background: var(--accent); }
  .tl-row .t { font-size: 12.5px; }
  .tl-row .t b { font-weight: 700; }
  .tl-row .d { font-size: 11px; color: var(--text-faint); font-family: var(--font-mono); margin-top: 1px; }

  .table-card { background: var(--surface); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-sm); }
  .table-toolbar { display: flex; align-items: center; gap: 8px; padding: 14px 16px; }
  .table-toolbar .title { font-weight: 700; font-size: 13px; margin-right: auto; }
  .chip-filter { display: flex; gap: 6px; }
  .chip-filter button {
    border: none; background: var(--surface-2); color: var(--text-muted); font-size: 11.5px; font-weight: 600;
    padding: 5px 11px; border-radius: 999px; cursor: pointer;
  }
  .chip-filter button.active { background: var(--accent); color: #1a1408; }

  .table-scroll { overflow-x: auto; }
  table.clients { width: 100%; border-collapse: collapse; min-width: 780px; }
  table.clients thead th {
    position: sticky; top: 0; background: var(--surface); text-align: left; font-size: 10.5px; text-transform: uppercase;
    letter-spacing: 0.05em; color: var(--text-faint); font-weight: 700; padding: 8px 16px 12px;
    cursor: pointer; user-select: none; white-space: nowrap;
  }
  table.clients thead th:hover { color: var(--text); }
  table.clients thead th .sort-arrow { margin-left: 3px; opacity: 0.5; font-size: 9px; }
  table.clients thead th.sorted .sort-arrow { opacity: 1; color: var(--accent); }
  table.clients tbody tr { cursor: pointer; }
  table.clients tbody tr:hover td { background: var(--surface-2); }
  table.clients tbody tr.selected td { background: var(--accent-soft); }
  table.clients td { padding: 11px 16px; font-size: 12.5px; vertical-align: middle; border-top: 1px solid var(--hairline); }
  table.clients tbody tr:first-child td { border-top: none; }
  .cell-name { display: flex; align-items: center; gap: 9px; font-weight: 600; }
  .mini-avatar { width: 28px; height: 28px; border-radius: var(--radius-sm); background: var(--surface-3); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: var(--text-muted); flex-shrink: 0; }
  .mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; color: var(--text-muted); }
  .level-pill { display: inline-flex; align-items: center; gap: 3px; background: var(--accent-2-soft); color: var(--accent-2); font-family: var(--font-mono); font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 999px; }

  .chip { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 700; padding: 4px 9px; border-radius: 999px; }
  .chip .dot { width: 6px; height: 6px; border-radius: 50%; }
  .chip.ok { background: var(--success-soft); color: var(--success); }
  .chip.ok .dot { background: var(--success); }
  .chip.late { background: var(--warning-soft); color: var(--warning); }
  .chip.late .dot { background: var(--warning); }
  .chip.off { background: var(--surface-3); color: var(--text-faint); }
  .chip.off .dot { background: var(--text-faint); }

  .row-actions { display: flex; justify-content: flex-end; }
  .row-actions .icon-btn { width: 28px; height: 28px; }

  .empty-panel { background: var(--surface); border-radius: var(--radius); padding: 40px 20px; text-align: center; color: var(--text-muted); font-size: 12.5px; }
  .empty-panel strong { display: block; color: var(--text); font-size: 14px; margin-bottom: 6px; font-family: var(--font-display); }

  /* ── Detail slide-over ── */
  .overlay { position: fixed; inset: 58px 0 0 0; background: rgba(0,0,0,0.5); z-index: 40; opacity: 0; pointer-events: none; transition: opacity 0.16s ease; }
  .overlay.open { opacity: 1; pointer-events: auto; }
  .panel {
    position: fixed; top: 58px; right: 0; bottom: 0; width: 400px; background: var(--surface);
    box-shadow: var(--shadow-lg); z-index: 50; transform: translateX(100%); transition: transform 0.18s ease; display: flex; flex-direction: column;
    border-radius: 20px 0 0 0;
  }
  .panel.open { transform: translateX(0); }
  .panel-head { padding: 20px 20px 0; }
  .panel-head-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
  .panel-avatar { width: 46px; height: 46px; border-radius: var(--radius-sm); background: var(--surface-3); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; }
  .panel-close { border: none; background: var(--surface-2); width: 28px; height: 28px; border-radius: var(--radius-sm); cursor: pointer; color: var(--text-muted); }
  .panel-name { font-family: var(--font-display); font-size: 17px; font-weight: 700; margin: 10px 0 2px; }
  .panel-sub { font-size: 12px; color: var(--text-muted); }
  .panel-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 14px 0; }
  .panel-stat { background: var(--surface-2); border-radius: var(--radius-sm); padding: 9px 10px; }
  .panel-stat .l { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-faint); font-weight: 700; }
  .panel-stat .v { font-family: var(--font-mono); font-size: 15px; font-weight: 700; margin-top: 2px; }
  .panel-tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--hairline); padding: 0 20px; }
  .panel-tab { border: none; background: none; padding: 9px 4px; margin-right: 16px; font-size: 12px; font-weight: 600; color: var(--text-faint); cursor: pointer; border-bottom: 2px solid transparent; }
  .panel-tab:hover { color: var(--text); }
  .panel-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .panel-body { padding: 16px 20px; overflow-y: auto; flex: 1; }
  .note-item { background: var(--surface-2); border-radius: var(--radius-sm); padding: 10px 12px; margin-bottom: 8px; }
  .note-item .txt { font-size: 12.5px; white-space: pre-wrap; }
  .note-item .meta { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; }
  .note-item .date { font-size: 10.5px; color: var(--text-faint); font-family: var(--font-mono); }
  .note-item .del { border: none; background: none; color: var(--text-faint); cursor: pointer; font-size: 11px; }
  .note-item .del:hover { color: var(--critical); }
  .note-form textarea { width: 100%; background: var(--surface-2); border: 1px solid transparent; border-radius: var(--radius-sm); padding: 10px 12px; color: var(--text); font-size: 12.5px; font-family: inherit; resize: vertical; min-height: 64px; }
  .note-form textarea:focus { border-color: var(--hairline); }
  .field-row { margin-bottom: 12px; }
  .field-row label { display: block; font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-faint); font-weight: 700; margin-bottom: 6px; }
  .field-row input, .field-row select, .field-row textarea {
    width: 100%; background: var(--surface-2); border: 1px solid transparent; border-radius: var(--radius-sm);
    padding: 9px 11px; color: var(--text); font-size: 13px; font-family: inherit; box-sizing: border-box;
  }
  .field-row input:focus, .field-row select:focus, .field-row textarea:focus { border-color: var(--hairline); }
  .field-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .modal-box { background: var(--surface); border-radius: var(--radius); padding: 22px; width: 100%; max-width: 460px; max-height: 86vh; overflow-y: auto; box-shadow: var(--shadow-lg); }
  .modal-box h3 { margin: 0 0 16px; font-family: var(--font-display); font-size: 16px; }
  .modal-actions { display: flex; gap: 8px; margin-top: 18px; }
  .modal-actions .btn { flex: 1; justify-content: center; }
  .day-block { background: var(--surface); border-radius: var(--radius); margin-bottom: 12px; overflow: hidden; }
  .day-head { display: flex; align-items: center; gap: 8px; padding: 12px 16px; font-weight: 700; font-size: 13px; }
  .day-head .del { margin-left: auto; }
  .exo-row { display: flex; align-items: center; gap: 8px; padding: 9px 16px; border-top: 1px solid var(--hairline); font-size: 12.5px; }
  .exo-row .nom { flex: 1; font-weight: 600; }
  .exo-row .stat { color: var(--text-muted); font-family: var(--font-mono); font-size: 11.5px; white-space: nowrap; }
  .exo-row .mini-btn { border: none; background: var(--surface-2); color: var(--text-muted); width: 22px; height: 22px; border-radius: 6px; cursor: pointer; font-size: 11px; }
  .exo-row .mini-btn:hover { color: var(--text); }
  .tpl-card { background: var(--surface); border-radius: var(--radius); padding: 16px; cursor: pointer; box-shadow: var(--shadow-sm); }
  .tpl-card .nom { font-weight: 700; font-size: 14px; margin-bottom: 6px; }
  .tpl-card .meta { font-size: 11.5px; color: var(--text-faint); }
  .tpl-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
  .panel-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--hairline); font-size: 12.5px; }
  .panel-row:last-child { border-bottom: none; }
  .panel-row .l { color: var(--text-muted); }
  .panel-row .v { font-weight: 600; }
  .panel-row .v.mono { font-family: var(--font-mono); }
  .panel-footer { padding: 14px 20px; border-top: 1px solid var(--hairline); display: flex; gap: 8px; }
  .panel-footer .btn { flex: 1; justify-content: center; text-decoration: none; }
</style>
</head>
<body>

<div id="gate" class="gate" style="display:none;">
  <div class="mark"></div>
  <h1>Connexion requise</h1>
  <p>Connecte-toi d'abord comme coach dans l'application AppTraining, puis reviens sur cette page.</p>
  <a class="btn primary" href="index.html">Ouvrir l'application</a>
</div>

<div id="loading" class="gate">
  <div class="spin"></div>
</div>

<div class="shell" id="shell" style="display:none;">
  <div class="topbar">
    <div class="brand"><span class="mark"></span>AppTraining<span class="sub">Console</span></div>
    <div class="search">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="searchInput" type="text" placeholder="Rechercher un client…" oninput="onSearch(this.value)" />
    </div>
    <div class="topbar-actions">
      <div class="dropdown">
        <button class="icon-btn" onclick="toggleMenu(event,'notif')" aria-label="Notifications">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 10-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 01-3.4 0"/></svg>
          <span class="badge-dot" id="notifCount" style="display:none;"></span>
        </button>
        <div class="menu" id="menu-notif" style="min-width:280px;"></div>
      </div>
      <div class="dropdown">
        <div class="avatar" onclick="toggleMenu(event,'account')">YG</div>
        <div class="menu" id="menu-account">
          <div class="menu-label">Yohan · Coach</div>

  if (l.type === 'bonus_ponctualite') return { icon:'🎯', txt:'Bonus de ponctualité du bilan', sub: l.semaine ? 'Semaine ' + l.semaine : '' };

}

function bigChart(data, color){
  const w=560,h=100,max=Math.max(1,...data),min=Math.min(...data,0);
  const pts = data.map((v,i)=>[ (i/(data.length-1||1))*w, h - ((v-min)/((max-min)||1))*(h-10) - 4 ]);
  const line = pts.map((p,i)=> (i===0?'M':'L')+p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
  const area = line + ` L${w},${h} L0,${h} Z`;
  const last = pts[pts.length-1];
  const gridLines = [0.25,0.5,0.75].map(f=>`<line x1="0" y1="${h*f}" x2="${w}" y2="${h*f}" stroke="var(--hairline)" stroke-width="1"/>`).join('');
  return `<svg class="bigchart" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    ${gridLines}
    <path d="${area}" fill="${color}" opacity="0.12"/>
    <path d="${line}" fill="none" stroke="${color}" stroke-width="2" vector-effect="non-scaling-stroke"/>
    <circle cx="${last[0]}" cy="${last[1]}" r="3.2" fill="${color}"/>
    <circle cx="${last[0]}" cy="${last[1]}" r="6" fill="${color}" opacity="0.18"/>
  </svg>`;
}

const GROUPES_MUSCULAIRES = ['Pectoraux','Dos','Épaules','Bras','Jambes','Abdominaux','Cardio','Full body'];
let progTab = 'exercices'; // 'exercices' | 'templates'
let exercicesData = null;  // null = pas encore chargé
let templatesData = null;
let exoGroupeFiltre = 'all';
let exoRecherche = '';
let tplCategorieFiltre = 'all';

async function chargerExercices(){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/exercices?order=nom.asc`, { headers: supaHeaders() });
  if (!res.ok) throw new Error('supabase_' + res.status);
  return res.json();
}
async function sauvegarderExercice(ex){
  const method = ex.id ? 'PATCH' : 'POST';
  const url = ex.id ? `${SUPABASE_URL}/rest/v1/exercices?id=eq.${ex.id}` : `${SUPABASE_URL}/rest/v1/exercices`;
  const body = { nom: ex.nom, groupe_musculaire: ex.groupe_musculaire || null, equipement: ex.equipement || null, video_url: ex.video_url || null, notes: ex.notes || null };
  const res = await fetch(url, { method, headers: supaHeaders({ Prefer: 'return=representation' }), body: JSON.stringify(body) });
  if (!res.ok) throw new Error('supabase_' + res.status);
  return (await res.json())[0];
}
async function supprimerExercice(id){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/exercices?id=eq.${id}`, { method: 'DELETE', headers: supaHeaders() });
  if (!res.ok) {
    if (res.status === 409) throw new Error("Cet exercice est utilisé dans un template — retire-le du template d'abord.");
    throw new Error('supabase_' + res.status);
  }
}

async function chargerTemplates(){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/programme_templates?order=nom.asc`, { headers: supaHeaders() });
  if (!res.ok) throw new Error('supabase_' + res.status);
  return res.json();
}
async function chargerTemplateExercices(templateId){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/programme_template_exercices?template_id=eq.${templateId}&order=jour.asc,ordre.asc`, { headers: supaHeaders() });
  if (!res.ok) throw new Error('supabase_' + res.status);
  return res.json();
}
async function sauvegarderTemplateComplet(tpl){
  const method = tpl.id ? 'PATCH' : 'POST';
  const url = tpl.id ? `${SUPABASE_URL}/rest/v1/programme_templates?id=eq.${tpl.id}` : `${SUPABASE_URL}/rest/v1/programme_templates`;
  const res = await fetch(url, { method, headers: supaHeaders({ Prefer: 'return=representation' }), body: JSON.stringify({ nom: tpl.nom, categorie: tpl.categorie || null, description: tpl.description || null }) });
  if (!res.ok) throw new Error('supabase_' + res.status);
  const saved = (await res.json())[0];
  const templateId = saved.id;
  if (tpl.id) {
    // Remplacement complet des lignes (comme modifierMenu côté GAS) plutôt qu'un diff fin.
    await fetch(`${SUPABASE_URL}/rest/v1/programme_template_exercices?template_id=eq.${templateId}`, { method: 'DELETE', headers: supaHeaders() });
  }
  const lignes = [];
  tpl.jours.forEach(jour => {
    jour.exercices.forEach((ex, idx) => {
      lignes.push({ template_id: templateId, exercice_id: ex.exercice_id, jour: jour.numero, ordre: idx, series: ex.series || null, reps: ex.reps || '', repos: ex.repos || '', tempo: ex.tempo || '', notes: ex.notes || '' });
    });
  });
  if (lignes.length) {
    const res2 = await fetch(`${SUPABASE_URL}/rest/v1/programme_template_exercices`, { method: 'POST', headers: supaHeaders({ Prefer: 'return=minimal' }), body: JSON.stringify(lignes) });
    if (!res2.ok) throw new Error('supabase_' + res2.status);
  }
  return saved;
}
async function supprimerTemplate(id){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/programme_templates?id=eq.${id}`, { method: 'DELETE', headers: supaHeaders() });
  if (!res.ok) throw new Error('supabase_' + res.status);
}

async function renderProgrammesPage(el){
  el.innerHTML = `
    <div class="page-head"><div><div class="eyebrow">Console coach</div><h1>Programmes</h1></div></div>
    <div class="chip-filter" style="margin-bottom:16px;">
      <button class="${progTab==='exercices'?'active':''}" onclick="progTab='exercices';renderProgrammesPage(document.getElementById('main'))">Exercices</button>
      <button class="${progTab==='templates'?'active':''}" onclick="progTab='templates';renderProgrammesPage(document.getElementById('main'))">Templates</button>
    </div>
    <div id="progrSub"><div style="text-align:center;padding:30px;color:var(--text-faint);">Chargement…</div></div>`;
  try {
    if (progTab === 'exercices') {
      if (exercicesData === null) exercicesData = await chargerExercices();
      renderExercicesSub();
    } else {
      if (templatesData === null) templatesData = await chargerTemplates();
      renderTemplatesSub();
    }
  } catch(e) {
    document.getElementById('progrSub').innerHTML = `<div class="empty-panel"><strong>Erreur de chargement</strong>${esc(e.message)}<br><br><button class="btn primary" onclick="renderProgrammesPage(document.getElementById('main'))" style="margin-top:10px;">Réessayer</button></div>`;
  }
}

// ── Sous-onglet Exercices ──────────────────────────────────────────────

    .filter(e => e.nom.toLowerCase().includes(exoRecherche.toLowerCase()));
  sub.innerHTML = `
    <div class="table-card">
      <div class="table-toolbar">
        <div class="title">${list.length} exercice${list.length>1?'s':''}</div>
        <input type="text" placeholder="Rechercher…" value="${esc(exoRecherche)}" oninput="exoRecherche=this.value;renderExercicesSub()" style="background:var(--surface-2);border:1px solid transparent;border-radius:var(--radius-sm);padding:6px 10px;color:var(--text);font-size:12px;width:160px;">
        <div class="chip-filter">
          <button class="${exoGroupeFiltre==='all'?'active':''}" onclick="exoGroupeFiltre='all';renderExercicesSub()">Tous</button>
          ${GROUPES_MUSCULAIRES.map(g => `<button class="${exoGroupeFiltre===g?'active':''}" onclick="exoGroupeFiltre='${g}';renderExercicesSub()">${g}</button>`).join('')}
        </div>
        <button class="btn primary" onclick="ouvrirFormExercice(null)">+ Nouvel exercice</button>
      </div>
      <div class="table-scroll"><table class="clients">
        <thead><tr><th>Nom</th><th>Groupe</th><th>Équipement</th><th>Vidéo</th><th></th></tr></thead>
        <tbody>
          ${list.map(e => `
            <tr onclick="ouvrirFormExercice(${e.id})">
              <td style="font-weight:600;">${esc(e.nom)}</td>
              <td>${e.groupe_musculaire ? `<span class="chip off">${esc(e.groupe_musculaire)}</span>` : '—'}</td>
              <td class="mono" style="color:var(--text-faint);">${esc(e.equipement||'—')}</td>
              <td>${e.video_url ? `<a href="${esc(e.video_url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()" style="color:var(--accent);">▶ Voir</a>` : '—'}</td>
              <td class="row-actions"><button class="icon-btn" onclick="event.stopPropagation();retirerExercice(${e.id})">${iTrash()}</button></td>
            </tr>`).join('') || `<tr><td colspan="5" style="text-align:center;color:var(--text-faint);padding:26px;">Aucun exercice. Crée le premier avec "+ Nouvel exercice".</td></tr>`}
        </tbody>
      </table></div>
    </div>`;
}

function ouvrirFormExercice(id){
  const ex = id ? exercicesData.find(e => e.id === id) : { nom:'', groupe_musculaire:'', equipement:'', video_url:'', notes:'' };
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'modal-exercice';
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
  overlay.innerHTML = `
    <div class="modal-box">
      <h3>${id ? 'Modifier' : 'Nouvel'} exercice</h3>
      <div class="field-row"><label>Nom</label><input id="fExoNom" type="text" value="${esc(ex.nom)}" placeholder="ex: Développé couché"></div>
      <div class="field-row"><label>Groupe musculaire</label>
        <select id="fExoGroupe">
          <option value="">—</option>
          ${GROUPES_MUSCULAIRES.map(g => `<option value="${g}" ${ex.groupe_musculaire===g?'selected':''}>${g}</option>`).join('')}
        </select>
      </div>
      <div class="field-row"><label>Équipement</label><input id="fExoEquip" type="text" value="${esc(ex.equipement||'')}" placeholder="ex: Barre, haltères, machine…"></div>
      <div class="field-row"><label>Lien vidéo (YouTube, Instagram…)</label><input id="fExoVideo" type="text" value="${esc(ex.video_url||'')}" placeholder="https://…"></div>
      <div class="field-row"><label>Notes / consignes</label><textarea id="fExoNotes" rows="3">${esc(ex.notes||'')}</textarea></div>
      <div id="fExoErr" style="display:none;color:var(--critical);font-size:12px;margin-bottom:8px;"></div>
      <div class="modal-actions">
        <button class="btn" onclick="document.getElementById('modal-exercice').remove()">Annuler</button>
        <button class="btn primary" onclick="confirmerFormExercice(${id||'null'})">Enregistrer</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

async function confirmerFormExercice(id){
  const nom = document.getElementById('fExoNom').value.trim();
  const errEl = document.getElementById('fExoErr');
  if (!nom) { errEl.textContent = 'Le nom est obligatoire.'; errEl.style.display = 'block'; return; }
  const payload = {
    id: id || null,
    nom,
    groupe_musculaire: document.getElementById('fExoGroupe').value,
    equipement: document.getElementById('fExoEquip').value.trim(),
    video_url: document.getElementById('fExoVideo').value.trim(),
    notes: document.getElementById('fExoNotes').value.trim(),
  };
  try {
    const saved = await sauvegarderExercice(payload);
    if (id) { const i = exercicesData.findIndex(e=>e.id===id); if (i>=0) exercicesData[i] = saved; }
    else exercicesData.push(saved);
    document.getElementById('modal-exercice').remove();
    renderExercicesSub();
  } catch(e) { errEl.textContent = 'Erreur : ' + e.message; errEl.style.display = 'block'; }
}

async function retirerExercice(id){
  if (!confirm('Supprimer cet exercice ?')) return;
  try {
    await supprimerExercice(id);
    exercicesData = exercicesData.filter(e => e.id !== id);
    renderExercicesSub();
  } catch(e) { alert(e.message); }
}

// ── Sous-onglet Templates ──────────────────────────────────────────────

  const categories = [...new Set((templatesData||[]).map(t=>t.categorie).filter(Boolean))];
  const list = (templatesData || []).filter(t => tplCategorieFiltre === 'all' || t.categorie === tplCategorieFiltre);
  sub.innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;">
      <div class="chip-filter">
        <button class="${tplCategorieFiltre==='all'?'active':''}" onclick="tplCategorieFiltre='all';renderTemplatesSub()">Tous</button>
        ${categories.map(c => `<button class="${tplCategorieFiltre===c?'active':''}" onclick="tplCategorieFiltre='${esc(c)}';renderTemplatesSub()">${esc(c)}</button>`).join('')}
      </div>
      <button class="btn primary" style="margin-left:auto;" onclick="ouvrirEditeurTemplate(null)">+ Nouveau template</button>
    </div>

let tplEnEdition = null; // { id, nom, categorie, description, jours: [{numero, exercices:[{exercice_id, nom, series, reps, repos, tempo}]}] }
let tplPickerJour = null;

async function ouvrirEditeurTemplate(id){
  if (exercicesData === null) { try { exercicesData = await chargerExercices(); } catch(e) { exercicesData = []; } }
  if (id) {
    const tpl = templatesData.find(t => t.id === id);
    const lignes = await chargerTemplateExercices(id);
    const jourNums = [...new Set(lignes.map(l=>l.jour))].sort((a,b)=>a-b);
    tplEnEdition = {
      id: tpl.id, nom: tpl.nom, categorie: tpl.categorie || '', description: tpl.description || '',
      jours: (jourNums.length ? jourNums : [1]).map(n => ({
        numero: n,
        exercices: lignes.filter(l=>l.jour===n).map(l => {
          const ex = exercicesData.find(e=>e.id===l.exercice_id);
          return { exercice_id: l.exercice_id, nom: ex ? ex.nom : '(exercice supprimé)', series: l.series, reps: l.reps, repos: l.repos, tempo: l.tempo };
        })
      }))
    };
  } else {
    tplEnEdition = { id: null, nom: '', categorie: '', description: '', jours: [{ numero: 1, exercices: [] }] };
  }
  renderEditeurTemplate();
}

function renderEditeurTemplate(){
  const el = document.getElementById('main');
  const t = tplEnEdition;
  el.innerHTML = `
    <div class="page-head">
      <div><div class="eyebrow">Console coach</div><h1>${t.id ? 'Modifier' : 'Nouveau'} template</h1></div>
      <button class="btn" onclick="progTab='templates';renderProgrammesPage(document.getElementById('main'))">‹ Retour</button>
    </div>
    <div class="table-card" style="padding:18px;margin-bottom:16px;">
      <div class="field-grid" style="grid-template-columns:2fr 1fr;">
        <div class="field-row" style="margin-bottom:0;"><label>Nom</label><input id="fTplNom" type="text" value="${esc(t.nom)}" placeholder="ex: Prise de masse — Bloc 1" oninput="tplEnEdition.nom=this.value"></div>
        <div class="field-row" style="margin-bottom:0;"><label>Catégorie</label><input id="fTplCat" type="text" value="${esc(t.categorie)}" placeholder="ex: Prise de masse" oninput="tplEnEdition.categorie=this.value"></div>
      </div>
      <div class="field-row" style="margin-top:12px;margin-bottom:0;"><label>Description</label><textarea id="fTplDesc" rows="2" oninput="tplEnEdition.description=this.value">${esc(t.description)}</textarea></div>
    </div>
    <div id="joursContainer"></div>
    <button class="btn" style="width:100%;margin-bottom:16px;" onclick="ajouterJourTemplate()">+ Ajouter un jour</button>
    <div id="tplErr" style="display:none;color:var(--critical);font-size:12px;margin-bottom:10px;"></div>
    <div style="display:flex;gap:8px;">
      <button class="btn" style="flex:1;justify-content:center;" onclick="progTab='templates';renderProgrammesPage(document.getElementById('main'))">Annuler</button>
      <button class="btn primary" style="flex:1;justify-content:center;" onclick="confirmerSauvegardeTemplate()">Enregistrer le template</button>
    </div>`;
  renderJoursTemplate();
}

function renderJoursTemplate(){
  const cont = document.getElementById('joursContainer');
  cont.innerHTML = tplEnEdition.jours.map((jour, ji) => `
    <div class="day-block">
      <div class="day-head">
        Jour ${jour.numero}
        <button class="icon-btn del" onclick="retirerJourTemplate(${ji})">${iTrash()}</button>
      </div>
      ${jour.exercices.map((ex, ei) => `
        <div class="exo-row">
          <span class="nom">${esc(ex.nom)}</span>
          <span class="stat">${ex.series||'—'}×${esc(ex.reps||'—')} · ${esc(ex.repos||'—')}</span>
          <button class="mini-btn" onclick="retirerExoDuJour(${ji},${ei})">✕</button>
        </div>`).join('')}
      <div style="padding:10px 16px;border-top:1px solid var(--hairline);">
        <button class="btn" style="width:100%;justify-content:center;" onclick="ouvrirPickerExercice(${ji})">+ Ajouter un exercice</button>
      </div>
    </div>`).join('');
}

function ajouterJourTemplate(){
  const nums = tplEnEdition.jours.map(j=>j.numero);
  tplEnEdition.jours.push({ numero: (nums.length?Math.max(...nums):0)+1, exercices: [] });
  renderJoursTemplate();
}
function retirerJourTemplate(ji){
  tplEnEdition.jours.splice(ji,1);
  renderJoursTemplate();
}
function retirerExoDuJour(ji, ei){
  tplEnEdition.jours[ji].exercices.splice(ei,1);
  renderJoursTemplate();
}

function ouvrirPickerExercice(ji){
  tplPickerJour = ji;
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'modal-picker';
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
  overlay.innerHTML = `
    <div class="modal-box">
      <h3>Choisir un exercice</h3>
      <div class="field-row"><input type="text" id="pickerSearch" placeholder="Rechercher…" oninput="renderPickerListe(this.value)"></div>
      <div id="pickerListe" style="max-height:280px;overflow-y:auto;"></div>
      <div class="modal-actions"><button class="btn" style="width:100%;" onclick="document.getElementById('modal-picker').remove()">Fermer</button></div>
    </div>`;
  document.body.appendChild(overlay);
  renderPickerListe('');
}
function renderPickerListe(q){
  const list = (exercicesData||[]).filter(e => e.nom.toLowerCase().includes((q||'').toLowerCase()));
  document.getElementById('pickerListe').innerHTML = list.map(e => `
    <div class="exo-row" style="cursor:pointer;" onclick="choisirExercicePourJour(${e.id})">
      <span class="nom">${esc(e.nom)}</span>
      <span class="stat">${esc(e.groupe_musculaire||'')}</span>
    </div>`).join('') || `<div style="padding:16px;text-align:center;color:var(--text-faint);">Aucun résultat.</div>`;
}
function choisirExercicePourJour(exerciceId){
  const ex = exercicesData.find(e => e.id === exerciceId);
  document.getElementById('modal-picker').remove();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'modal-dosage';
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
  overlay.innerHTML = `
    <div class="modal-box">
      <h3>${esc(ex.nom)}</h3>
      <div class="field-grid">
        <div class="field-row"><label>Séries</label><input id="fDoseSeries" type="text" inputmode="numeric" placeholder="3"></div>
        <div class="field-row"><label>Reps</label><input id="fDoseReps" type="text" placeholder="8-12"></div>
        <div class="field-row"><label>Repos</label><input id="fDoseRepos" type="text" placeholder="90s"></div>
        <div class="field-row"><label>Tempo</label><input id="fDoseTempo" type="text" placeholder="2010"></div>
      </div>
      <div class="modal-actions">
        <button class="btn" onclick="document.getElementById('modal-dosage').remove()">Annuler</button>
        <button class="btn primary" onclick="confirmerAjoutExoJour(${exerciceId})">Ajouter</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}
function confirmerAjoutExoJour(exerciceId){
  const ex = exercicesData.find(e => e.id === exerciceId);
  tplEnEdition.jours[tplPickerJour].exercices.push({
    exercice_id: exerciceId, nom: ex.nom,
    series: parseInt(document.getElementById('fDoseSeries').value) || null,
    reps: document.getElementById('fDoseReps').value.trim(),
    repos: document.getElementById('fDoseRepos').value.trim(),
    tempo: document.getElementById('fDoseTempo').value.trim(),
  });
  document.getElementById('modal-dosage').remove();
  renderJoursTemplate();
}

async function confirmerSauvegardeTemplate(){
  const errEl = document.getElementById('tplErr');
  if (!tplEnEdition.nom.trim()) { errEl.textContent = 'Le nom du template est obligatoire.'; errEl.style.display = 'block'; return; }
  try {
    const saved = await sauvegarderTemplateComplet(tplEnEdition);
    if (tplEnEdition.id) { const i = templatesData.findIndex(t=>t.id===tplEnEdition.id); if (i>=0) templatesData[i] = saved; }
    else templatesData.push(saved);
    progTab = 'templates';
    renderProgrammesPage(document.getElementById('main'));
  } catch(e) { errEl.textContent = 'Erreur : ' + e.message; errEl.style.display = 'block'; }
}
async function supprimerTemplateAction(id){
  if (!confirm('Supprimer ce template ?')) return;
  try {
    await supprimerTemplate(id);
    templatesData = templatesData.filter(t => t.id !== id);
    renderTemplatesSub();
  } catch(e) { alert(e.message); }
}

function renderDashboard(el){
  const bilansATraiter = data.bilansCoach.filter(b=>!b.coachTraite).sort((a,b)=> (b.ts||'').localeCompare(a.ts||''));
  const bilansEnRetard = data.clients.filter(c=>c.enRetard);

  // Activité 7 jours : nombre de logs par jour calendaire (à partir de tms)
  const jourKey = tms => { const d = new Date(tms); return d.getFullYear()+'-'+d.getMonth()+'-'+d.getDate(); };
  const counts = {};
  data.logs.forEach(l => { const k = jourKey(l.tms); counts[k] = (counts[k]||0) + 1; });
  const days = [];
  for (let i = 6; i >= 0; i--) { const d = new Date(); d.setDate(d.getDate()-i); days.push(counts[d.getFullYear()+'-'+d.getMonth()+'-'+d.getDate()] || 0); }
  const totalActivite = data.logs.length;

  el.innerHTML = `
    <div class="page-head">
      <div><div class="eyebrow">Console coach</div><h1>Accueil</h1></div>
      <div class="meta">${data.clients.length} client${data.clients.length>1?'s':''}</div>
    </div>
    <div class="dash-grid">
      <div class="card">
        <div class="card-head">${iSend()}<span class="t">Bilans à traiter</span></div>
        ${bilansATraiter.length ? `<div class="card-list">
          ${bilansATraiter.map(b => `
            <div class="card-list-row" onclick="marquerTraite('${b.client}','${esc(b.ts)}')">
              <div class="mini-avatar">${initials(b.nom)}</div>
              <div><div class="t">${esc(b.nom)}</div><div class="s">Semaine ${esc(b.semaine||'')} · clic pour marquer traité</div></div>
              <div class="time">${esc(b.ts||'')}</div>
            </div>`).join('')}
        </div>` : `<div class="card-empty">${iCheckCircle()}Aucun bilan en attente.</div>`}
      </div>
      <div class="card">
        <div class="card-head">${iClipboard()}<span class="t">Bilans en retard</span></div>
        ${bilansEnRetard.length ? `<div class="card-list">
          ${bilansEnRetard.map(c => `
            <div class="card-list-row" onclick="openPanel('${c.id}')">
              <div class="mini-avatar">${initials(c.nom)}</div>
              <div><div class="t">${esc(c.nom)}</div><div class="s">Niveau ${c.niveau||1}</div></div>
              <span class="chip late"><span class="dot"></span>Retard</span>
            </div>`).join('')}
        </div>` : `<div class="card-empty">${iCheckCircle()}Tous vos clients sont à jour.</div>`}
      </div>
      <div class="card timeline-card" style="grid-row: span 2;">
        <div class="card-head">${iGrid()}<span class="t">Activité récente</span></div>
        <div class="card-list">
          ${data.logs.length ? data.logs.slice(0,25).map(l => { const lib = libelleLog(l); return `
            <div class="tl-row"><div class="tl-dot"></div><div><div class="t">${lib.icon} <b>${esc(l.nom)}</b> — ${esc(lib.txt)}</div><div class="d">${esc(l.ts)}</div></div></div>`; }).join('')
            : '<div class="card-empty">Aucune activité sur les 7 derniers jours.</div>'}
        </div>
      </div>
      <div class="card chart-card" style="grid-column: span 2;">
        <div class="card-head" style="padding-bottom:0;">${iTrophy()}<span class="t">Activité (7 jours)</span></div>
        <div class="chart-top"><div class="big-value">${totalActivite} <span style="font-size:13px;color:var(--text-faint);font-family:var(--font-body);font-weight:600;">événements</span></div></div>
        ${bigChart(days,'var(--accent)')}
      </div>
      <div class="card">
        <div class="card-head">${iDatabase()}<span class="t">Aliments à valider</span></div>
        ${data.aValider.length ? `<div class="card-list">
          ${data.aValider.slice(0,4).map(a => `
            <div class="card-list-row">
              <div><div class="t">${esc(a.nom)}</div><div class="s">ajouté par ${esc(a.ajoutePar||'?')}</div></div>
            </div>`).join('')}
        </div>` : `<div class="card-empty">${iCheckCircle()}Rien à valider.</div>`}
      </div>
    </div>`;
}

async function marquerTraite(client, ts){
  try {
    await apiAs('marquerBilanTraiteServeur', client, { ts });
    await rafraichir();
  } catch(e) { alert('Erreur : ' + e.message); }
}

function renderClientsPage(el){
  el.innerHTML = `
    <div class="page-head">
      <div><div class="eyebrow">Console coach</div><h1>Clients</h1></div>
      <div class="meta" id="clientCount"></div>
    </div>
    <div class="table-card">
      <div class="table-toolbar">
        <div class="title">Tous les clients</div>
        <div class="chip-filter">
          <button class="${state.statusFilter==='all'?'active':''}" onclick="setStatusFilter('all')">Tous</button>
          <button class="${state.statusFilter==='late'?'active':''}" onclick="setStatusFilter('late')">En retard</button>
          <button class="${state.statusFilter==='locked'?'active':''}" onclick="setStatusFilter('locked')">Verrouillés</button>
        </div>
      </div>
      <div class="table-scroll"><table class="clients">
        <thead><tr>
          <th onclick="setSort('nom')" class="${state.sortKey==='nom'?'sorted':''}">Client<span class="sort-arrow">${arrow('nom')}</span></th>
          <th>Statut bilan</th>
          <th onclick="setSort('niveau')" class="${state.sortKey==='niveau'?'sorted':''}">Niveau<span class="sort-arrow">${arrow('niveau')}</span></th>
          <th>Titre actif</th>
          <th>Dernière connexion</th>
          <th></th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table></div>
    </div>`;
  renderTable();
}

function arrow(key){ return state.sortKey===key ? (state.sortDir===1?'▲':'▼') : '▲'; }

function renderTable(){
  const list = filteredSortedClients();
  const countEl = document.getElementById('clientCount');
  if (countEl) countEl.textContent = list.length + ' client' + (list.length>1?'s':'');
  const body = document.getElementById('tbody');
  if (!body) return;
  body.innerHTML = list.map(c => `
    <tr class="${state.selected===c.id?'selected':''}" onclick="openPanel('${c.id}')">
      <td><div class="cell-name"><div class="mini-avatar">${initials(c.nom)}</div>${esc(c.nom)}</div></td>
      <td>${c.enRetard ? `<span class="chip late"><span class="dot"></span>En retard</span>` : `<span class="chip ok"><span class="dot"></span>À jour</span>`}${c.verrouile ? ` <span class="chip off">🔒</span>` : ''}</td>
      <td><span class="level-pill">Niv. ${c.niveau||1}</span></td>
      <td>${esc(c.titreActif||'—')}</td>
      <td class="mono" style="color:var(--text-faint);">${esc(c.dernConnexion||'Jamais connecté')}</td>
      <td class="row-actions">
        <div class="dropdown">
          <button class="icon-btn" onclick="event.stopPropagation();toggleMenu(event,'row${c.id}')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="5" r="1.2"/><circle cx="12" cy="12" r="1.2"/><circle cx="12" cy="19" r="1.2"/></svg>
          </button>
          <div class="menu" id="menu-row${c.id}">
            <button class="menu-item" onclick="event.stopPropagation();openPanel('${c.id}')">${iUsers()}Voir la fiche</button>
            <button class="menu-item" onclick="event.stopPropagation();window.location.href='index.html?viewAs=${encodeURIComponent(c.id)}'">${iGrid()}Ouvrir en vue client</button>
            <button class="menu-item" onclick="event.stopPropagation();toggleChimie('${c.id}',${!!c.chimieActif})">${iFlask()}${c.chimieActif?'Désactiver':'Activer'} le protocole</button>
            <div class="menu-sep"></div>
            <button class="menu-item" onclick="event.stopPropagation();toggleVerrou('${c.id}',${!!c.verrouile})">${c.verrouile?iUnlock():iLock()}${c.verrouile?'Déverrouiller':'Verrouiller'} l'accès</button>
          </div>
        </div>
      </td>
    </tr>
  `).join('') || `<tr><td colspan="6" style="text-align:center;color:var(--text-faint);padding:26px;">Aucun client ne correspond.</td></tr>`;
}

async function toggleChimie(id, actif){
  try { await apiAs('definirChimieActif', id, { actif: !actif }); await rafraichir(); if (state.nav==='clients') renderTable(); }
  catch(e) { alert('Erreur : ' + e.message); }
}
async function toggleVerrou(id, verrouille){
  try { await apiAs(verrouille ? 'deverrouilerAccesClient' : 'verrouilerAccesClient', id); await rafraichir(); if (state.nav==='clients') renderTable(); }
  catch(e) { alert('Erreur : ' + e.message); }
}

let panelTab = 'apercu';
let panelNotes = null; // null = pas encore chargées
async function openPanel(id){
  state.selected = id;
  panelTab = 'apercu';
  panelNotes = null;
  if (state.nav==='clients') renderTable();
  const c = data.clients.find(x=>x.id===id);
  if (!c) return;
  document.getElementById('panel').innerHTML = panelHTML(c);
  document.getElementById('panel').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}
function closePanel(){
  state.selected = null;
  if (state.nav==='clients') renderTable();
  document.getElementById('panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

async function setPanelTab(t){
  panelTab = t;
  document.querySelectorAll('.panel-tab').forEach(b=>b.classList.toggle('active', b.dataset.tab===t));
  const body = document.getElementById('panelBody');
  const c = data.clients.find(x=>x.id===state.selected);
  if (!c) return;
  if (t === 'notes' && panelNotes === null) {
    body.innerHTML = `<div style="text-align:center;padding:20px;color:var(--text-faint);">Chargement…</div>`;
    try { panelNotes = await chargerNotes(c.id); } catch(e) { panelNotes = null; body.innerHTML = `<div class="empty-panel"><strong>Erreur</strong>${esc(e.message)}</div>`; return; }
  }
  body.innerHTML = panelTabContent(c, t);
}

function panelTabContent(c, t){
  if (t === 'notes') return renderNotesTab();
  return `
    <div class="panel-row"><span class="l">Statut bilan</span><span class="chip ${c.enRetard?'late':'ok'}"><span class="dot"></span>${c.enRetard?'En retard':'À jour'}</span></div>
    <div class="panel-row"><span class="l">Dernière connexion</span><span class="v mono" style="font-size:11px;">${esc(c.dernConnexion||'Jamais connecté')}</span></div>
    <div class="panel-row"><span class="l">Accès feuille</span><span class="v">${c.verrouile ? '🔒 Verrouillé' : 'Libre'}</span></div>
    <div class="panel-row"><span class="l">Protocole chimie</span><span class="v">${c.chimieActif ? 'Actif' : 'Inactif'}</span></div>`;
}

function renderNotesTab(){
  const notes = panelNotes || [];
  return `
    <div class="note-form" style="margin-bottom:14px;">
      <textarea id="noteInput" placeholder="Écrire une note privée sur ce client…"></textarea>
      <button class="btn primary" style="margin-top:8px;width:100%;justify-content:center;" onclick="soumettreNote()">Ajouter la note</button>
    </div>
    ${notes.length ? notes.map(n => `
      <div class="note-item">
        <div class="txt">${esc(n.contenu)}</div>
        <div class="meta"><span class="date">${fmtDateNote(n.created_at)}</span><button class="del" onclick="retirerNote(${n.id})">Supprimer</button></div>
      </div>`).join('') : `<div class="empty-panel" style="padding:24px 12px;">Aucune note pour ce client.</div>`}`;
}

async function soumettreNote(){
  const el = document.getElementById('noteInput');
  const contenu = (el.value || '').trim();
  if (!contenu) return;
  const c = data.clients.find(x=>x.id===state.selected);
  if (!c) return;
  try {
    await ajouterNote(c.id, contenu);
    panelNotes = await chargerNotes(c.id);
    document.getElementById('panelBody').innerHTML = renderNotesTab();
  } catch(e) { alert('Erreur : ' + e.message); }
}
async function retirerNote(id){
  const c = data.clients.find(x=>x.id===state.selected);
  if (!c) return;
  try {
    await supprimerNoteApi(id);
    panelNotes = await chargerNotes(c.id);
    document.getElementById('panelBody').innerHTML = renderNotesTab();
  } catch(e) { alert('Erreur : ' + e.message); }
}

function panelHTML(c){
  return `
    <div class="panel-head">
      <div class="panel-head-top">
        <div class="panel-avatar">${initials(c.nom)}</div>
        <button class="panel-close" onclick="closePanel()">✕</button>
      </div>
      <div class="panel-name">${esc(c.nom)}</div>
      <div class="panel-sub">${esc(c.titreActif || 'Aucun titre actif')}</div>
      <div class="panel-stats">
        <div class="panel-stat"><div class="l">Niveau</div><div class="v">${c.niveau||1}</div></div>
        <div class="panel-stat"><div class="l">Statut</div><div class="v" style="font-size:12px;">${c.enRetard?'En retard':'À jour'}</div></div>
        <div class="panel-stat"><div class="l">Chimie</div><div class="v" style="font-size:12px;">${c.chimieActif?'Actif':'Inactif'}</div></div>
      </div>
    </div>
    <div class="panel-tabs">
      <button class="panel-tab active" data-tab="apercu" onclick="setPanelTab('apercu')">Aperçu</button>
      <button class="panel-tab" data-tab="notes" onclick="setPanelTab('notes')">Notes</button>
    </div>
    <div class="panel-body" id="panelBody">${panelTabContent(c, 'apercu')}</div>
    <div class="panel-footer">
      <a class="btn primary" href="index.html?viewAs=${encodeURIComponent(c.id)}">Ouvrir en vue client</a>
    </div>`;
}

// ── Dropdowns génériques ──────────────────────────────────────────────────
function toggleMenu(ev, id){
  ev.stopPropagation();
  const target = document.getElementById('menu-'+id);
  const wasOpen = target.classList.contains('open');
  document.querySelectorAll('.menu.open').forEach(m=>m.classList.remove('open'));
  if (!wasOpen) target.classList.add('open');
}
document.addEventListener('click', () => document.querySelectorAll('.menu.open').forEach(m=>m.classList.remove('open')));

function renderNotifMenu(){
  const bilans = data.bilansCoach.filter(b=>!b.coachTraite).slice(0,3);
  const retards = data.clients.filter(c=>c.enRetard).slice(0,3);
  const items = [
    ...bilans.map(b => `<div class="menu-item" style="align-items:flex-start;flex-direction:column;gap:1px;"><b>${esc(b.nom)}</b><span style="color:var(--text-faint);font-size:11.5px;">bilan à traiter · semaine ${esc(b.semaine||'')}</span></div>`),
    ...retards.map(c => `<div class="menu-item" style="align-items:flex-start;flex-direction:column;gap:1px;"><b>${esc(c.nom)}</b><span style="color:var(--text-faint);font-size:11.5px;">bilan en retard</span></div>`),
  ];
  const menu = document.getElementById('menu-notif');
  menu.innerHTML = `<div class="menu-label">À traiter</div>` + (items.length ? items.join('') : `<div class="menu-item" style="color:var(--text-faint);">Rien à signaler.</div>`);
  const count = bilans.length + retards.length;
  const badge = document.getElementById('notifCount');
  if (count) { badge.style.display='flex'; badge.textContent = count; } else { badge.style.display='none'; }
}

// ── Boot ───────────────────────────────────────────────────────────────
(async function boot(){
  await rafraichir();
  renderNotifMenu();
  document.getElementById('loading').style.display = 'none';
  document.getElementById('shell').style.display = 'grid';
})();
</script>
</body>
</html>
